        - {type: A, name: bar.foo.com.bar, data: "127.0.0.1", ttl: 600}

  - id: param_fqdn_with_dot
    description: "%fqdn%. with trailing dot resolves to host"
    input:
      zone_records: []
      template_records:
        - {type: A, host: "%fqdn%.", pointsTo: "127.0.0.1", ttl: 600}
      domain: foo.com
