version: "1.0"
suite_type: process_records
description: "Domain Connect process_records compliance tests"

# =============================================================================
# Domain Connect — process_records Compliance Test Suite
# =============================================================================
#
# PURPOSE
# -------
# This file defines a language-agnostic compliance test suite for the
# process_records call of any Domain Connect zone-apply implementation.
#
# process_records is the low-level entry point that takes inline
# template_records and applies them against a zone without loading any
# template file from disk.  It covers all record-type conflict rules,
# variable substitution, group filtering, multi-aware / multi-instance
# semantics, redirect records, and input validation.
#
# Any conforming library — regardless of programming language — can load this
# file and verify correctness by driving its own process_records (or
# equivalent) function.
#
# The reference Python implementation and test harness live at:
#   https://github.com/Domain-Connect/DomainConnectApplyZone
#
# For the high-level apply_template tests (which load template files from
# disk) see apply_template_tests.yaml in the same directory.
#
# =============================================================================
# TOP-LEVEL FIELDS
# =============================================================================
#
#   version     string   Format version of this file (currently "1.0").
#   suite_type  string   Always "process_records" for this file.  Test
#                        harnesses use this field to locate the correct files
#                        when scanning a directory.
#   description string   Human-readable summary.
#   tests       list     Ordered list of test case objects (see below).
#
# =============================================================================
# TEST CASE STRUCTURE
# =============================================================================
#
# Each entry in `tests` is a mapping with the following fields:
#
#   id          string   Unique snake_case identifier.  Used as the test method
#                        name by test harnesses (e.g. "test_<id>").
#
#   description string   Human-readable description of what the test verifies.
#
#   input       mapping  All inputs for the call (see INPUT FIELDS below).
#
#   expect      mapping  Expected outputs / behaviour (see EXPECT FIELDS below).
#
# =============================================================================
# INPUT FIELDS  (input:)
# =============================================================================
#
#   zone_records      list     Current DNS zone records before the template is
#                              applied.  Each record is a mapping; see ZONE
#                              RECORD STRUCTURE below.  May be empty ([]).
#   template_records  list     The template record definitions to apply.  Each
#                              record is a mapping; see TEMPLATE RECORD
#                              STRUCTURE below.
#   domain            string   The domain name being managed (e.g. "example.com").
#   host              string   Sub-domain / host label to apply the template
#                              under.  Empty string ("") means the apex (@).
#   params            mapping  Variable substitution values keyed by variable
#                              name (case-insensitive).  Maps to the %VARIABLE%
#                              tokens in template records.
#   group_ids         list     Optional.  When non-empty, only template records
#                              whose groupId matches one of these values are
#                              applied.  Default: [] (all records applied).
#   multi_aware       boolean  Optional.  When true, the processor tracks
#                              template provenance via the _dc metadata field
#                              and applies cascade-deletion rules.
#                              Default: false.
#   multi_instance    boolean  Optional.  When true (and multi_aware is true),
#                              multiple independent instances of the same
#                              template can coexist in the zone.
#                              Default: false.
#   provider_id       string   Optional.  Provider identifier written into _dc
#                              metadata; required when multi_aware is true.
#   service_id        string   Optional.  Service identifier written into _dc
#                              metadata; required when multi_aware is true.
#   unique_id         string   Optional.  Instance identifier written into
#                              _dc.id.  When omitted with multi_aware=true the
#                              implementation assigns a random value.
#   redirect_records  list     Optional.  Template records used to provision
#                              the A/AAAA backing records for REDIR301/REDIR302
#                              entries.  Required when any template_record has
#                              type REDIR301 or REDIR302.
#
# =============================================================================
# EXPECT FIELDS  (expect:)
# =============================================================================
#
# A test either expects a successful outcome or an exception — never both.
#
# Successful outcome
# ------------------
#   new_count     integer  Expected number of records added to the zone.
#   delete_count  integer  Expected number of records marked for deletion.
#   records       list     Expected final state of the zone (all non-deleted
#                          records) after the call.  Records are compared in a
#                          canonical sorted order: (type, name, ttl, data).
#                          Set to null to skip the records assertion.
#
# Exception outcome
# -----------------
#   exception     string   Name of the exception class that must be raised.
#                          One of:
#                            InvalidData       – bad record content or format
#                            InvalidTemplate   – malformed or missing template
#                            MissingParameter  – required %VARIABLE% not supplied
#                            HostRequired      – template needs a host but none
#                                               was provided
#                            TypeError         – unrecognised record type string
#
# =============================================================================
# ZONE RECORD STRUCTURE
# =============================================================================
#
# Zone records represent the current or final state of a DNS zone.
#
#   type      string   DNS record type: A, AAAA, CNAME, MX, NS, TXT, SRV,
#                      REDIR301, REDIR302, or a custom type (e.g. CAA, TYPE256).
#   name      string   Relative owner name within the zone.  "@" means the apex.
#   data      string   Record data / rdata value.
#   ttl       integer  Time-to-live in seconds.
#   priority  integer  (MX, SRV) Priority / preference value.
#   protocol  string   (SRV) Protocol, e.g. "UDP", "TCP", "TLS".
#   service   string   (SRV) Service host.
#   weight    integer  (SRV) Weight value.
#   port      integer  (SRV) Port number.
#   _dc       mapping  (multi-aware) Template provenance metadata:
#               id          string  Instance identifier.
#               providerId  string  Template provider ID.
#               serviceId   string  Template service ID.
#               host        string  Host parameter at the time of application.
#               essential   string  "Always" or "OnApply" — controls whether
#                                   the record survives cascade deletion when a
#                                   different template is applied later.
#
# =============================================================================
# TEMPLATE RECORD STRUCTURE
# =============================================================================
#
# Template records define what should be written to the zone.  Values may
# contain %VARIABLE% tokens substituted from params before processing.
# The special token "@" in a host/pointsTo field resolves to the
# fully-qualified domain name (fqdn = [host.]domain) for the current
# application.
#
# Common fields
# -------------
#   type       string   DNS record type (A, AAAA, CNAME, MX, NS, TXT, SRV,
#                       SPFM, REDIR301, REDIR302, or a custom type).
#   host       string   Relative owner name, or "@" for the apex.
#                       For SRV records use "name" instead.
#   ttl        integer  Time-to-live in seconds.
#   groupId    string   Optional group identifier for selective application.
#   essential  string   Optional.  "Always" or "OnApply" — stored in _dc
#                       metadata when multi_aware is true.
#
# Type-specific fields
# --------------------
#   A / AAAA / CNAME / NS / MX
#     pointsTo  string  Target value.  For MX also set priority.
#
#   TXT
#     data                      string  Record content.
#     txtConflictMatchingMode   string  Optional. "None" | "All" | "Prefix".
#                                       Controls which existing TXT records are
#                                       deleted.  Default: implicit (delete
#                                       conflicting CNAMEs only).
#     txtConflictMatchingPrefix string  Required when mode is "Prefix".
#
#   SRV
#     name      string   Owner name (use instead of host).
#     target    string   Target host.
#     protocol  string   "UDP", "TCP", or "TLS" (leading _ stripped if present).
#     service   string   Service host.
#     priority  integer
#     weight    integer
#     port      integer
#
#   SPFM  (SPF merge)
#     spfRules  string  SPF mechanism(s) to merge into the zone's SPF record.
#
#   REDIR301 / REDIR302
#     target  string  Redirect destination URL.  May contain %VARIABLE% tokens.
#                     Requires redirect_records to be set in input.
#
#   Custom types (CAA, TYPE<N>, …)
#     data    string  Raw record data.  Supports %VARIABLE% substitution and
#                     "@" → fqdn resolution.
#
# =============================================================================

tests:

  # ---------------------------------------------------------------------------
  # CNAME
  # ---------------------------------------------------------------------------
  - id: cname_delete
    description: "CNAME deletes all non-NS records at the same host"
    input:
      zone_records:
        - {type: A,    name: bar, data: abc, ttl: 400}
        - {type: AAAA, name: bar, data: abc, ttl: 400}
        - {type: TXT,  name: bar, data: abc, ttl: 400}
        - {type: MX,   name: bar, data: abc, ttl: 400, priority: 4}
      template_records:
        - {type: CNAME, host: "@", pointsTo: abc, ttl: 600}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 4
      records:
        - {type: CNAME, name: bar, data: abc, ttl: 600}

  - id: cname_trailing_dot_in_pointsto
    description: "CNAME with trailing dot in pointsTo is kept as-is"
    input:
      zone_records: []
      template_records:
        - {type: CNAME, host: "@", pointsTo: "bar.com.", ttl: 600}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: CNAME, name: bar, data: "bar.com.", ttl: 600}

  - id: cname_conflict_itself
    description: "CNAME raises conflict if 2 CNAMEs with same host generated"
    input:
      zone_records:
      template_records:
        - {type: CNAME, host: "blah", pointsTo: abc, ttl: 600}
        - {type: CNAME, host: "%sub%", pointsTo: cde, ttl: 600}
      domain: foo.com
      host: blah
      params: { sub: blah }
    expect:
      exception: InvalidData

  - id: cname_not_conflict_itself_other_host
    description: "CNAME raises conflict if 2 CNAMEs with same host generated"
    input:
      zone_records:
      template_records:
        - {type: CNAME, host: "sub", pointsTo: abc, ttl: 600}
        - {type: CNAME, host: "%sub%", pointsTo: cde, ttl: 600}
      domain: foo.com
      host: blah
      params: { sub: varsub }
    expect:
      new_count: 2
      delete_count: 0
      records:
        - {type: CNAME, name: sub.blah, data: "abc", ttl: 600}
        - {type: CNAME, name: varsub.blah, data: "cde", ttl: 600}

  - id: cname_conflict_itself_a
    description: "CNAME raises conflict with A other record on the same host generated"
    input:
      zone_records:
      template_records:
        - {type: CNAME, host: "blah", pointsTo: abc, ttl: 600}
        - {type: A, host: "%sub%", pointsTo: 192.168.1.1, ttl: 600}
      domain: foo.com
      host: blah
      params: { sub: blah }
    expect:
      exception: InvalidData


  # ---------------------------------------------------------------------------
  # SRV
  # ---------------------------------------------------------------------------
  - id: srv_add
    description: "SRV records are added; protocol prefix underscore stripped"
    input:
      zone_records: []
      template_records:
        - {type: SRV, name: _abc, target: "127.0.0.1", protocol: UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
        - {type: SRV, name: _abc, target: "127.0.0.1", protocol: TCP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
        - {type: SRV, name: _abc, target: "127.0.0.1", protocol: TLS, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
      domain: foo.com
      host: bar
      params: {v1: "1"}
    expect:
      new_count: 3
      delete_count: 0
      records:
        - {type: SRV, name: _abc.bar, data: "127.0.0.1", protocol: UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
        - {type: SRV, name: _abc.bar, data: "127.0.0.1", protocol: TCP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
        - {type: SRV, name: _abc.bar, data: "127.0.0.1", protocol: TLS, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}

  - id: srv_remove_underscore_in_protocol
    description: "SRV protocol leading underscore is stripped"
    input:
      zone_records: []
      template_records:
        - {type: SRV, name: _abc, target: "127.0.0.1", protocol: _UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
      domain: foo.com
      host: bar
      params: {v1: "1"}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: SRV, name: _abc.bar, data: "127.0.0.1", protocol: UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}

  - id: srv_at_name_on_subdomain
    description: "SRV with @ name resolves to host subdomain"
    input:
      zone_records: []
      template_records:
        - {type: SRV, name: "@", target: "127.0.0.1", protocol: UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
      domain: foo.com
      host: bar
      params: {v1: "1"}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: SRV, name: bar, data: "127.0.0.1", protocol: UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}

  - id: srv_replace
    description: "SRV record replaces existing SRV at same host/protocol/service"
    input:
      zone_records:
        - {type: SRV, name: _abc.bar, data: "127.0.0.1", protocol: UDP, service: foo.com, priority: 10, weight: 10, port: 5, ttl: 400}
      template_records:
        - {type: SRV, name: _abc, target: "127.0.0.1", protocol: UDP, service: bar.com, priority: 10, weight: 10, port: 5, ttl: 400}
      domain: foo.com
      host: bar
      params: {v1: "1"}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: SRV, name: _abc.bar, data: "127.0.0.1", protocol: UDP, service: bar.com, priority: 10, weight: 10, port: 5, ttl: 400}

  # ---------------------------------------------------------------------------
  # SPFM
  # ---------------------------------------------------------------------------
  - id: spfm_merge_new
    description: "SPFM creates a new SPF TXT record when none exists"
    input:
      zone_records:
        - {type: A,    name: "@", data: old.old.old.old, ttl: 500}
        - {type: AAAA, name: "@", data: bog.bog.bog.bog, ttl: 200}
      template_records:
        - {type: SPFM, host: "@", spfRules: foo}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: A,    name: "@", data: old.old.old.old, ttl: 500}
        - {type: AAAA, name: "@", data: bog.bog.bog.bog, ttl: 200}
        - {type: TXT,  name: "@", data: "v=spf1 foo ~all", ttl: 6000}

  - id: spfm_merge_existing
    description: "SPFM merges rules into an existing SPF TXT record"
    input:
      zone_records:
        - {type: A,   name: "@", data: old.old.old.old, ttl: 500}
        - {type: TXT, name: "@", data: "v=spf1 bar -all", ttl: 5000}
        - {type: AAAA, name: "@", data: bog.bog.bog.bog, ttl: 200}
      template_records:
        - {type: SPFM, host: "@", spfRules: foo}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: A,    name: "@", data: old.old.old.old, ttl: 500}
        - {type: AAAA, name: "@", data: bog.bog.bog.bog, ttl: 200}
        - {type: TXT,  name: "@", data: "v=spf1 foo bar -all", ttl: 5000}

  - id: spfm_rule_already_present
    description: "SPFM does nothing when the rule is already present"
    input:
      zone_records:
        - {type: TXT, name: "@", data: "v=spf1 foo -all", ttl: 5000}
      template_records:
        - {type: SPFM, host: "@", spfRules: foo}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 0
      delete_count: 0
      records:
        - {type: TXT, name: "@", data: "v=spf1 foo -all", ttl: 5000}

  - id: spfm_new_uses_template_ttl
    description: "SPFM uses the template ttl when creating a new SPF record"
    input:
      zone_records: []
      template_records:
        - {type: SPFM, host: "@", spfRules: foo, ttl: 300}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: "@", data: "v=spf1 foo ~all", ttl: 300}

  - id: spfm_new_defaults_ttl_6000
    description: "SPFM falls back to ttl 6000 when template has no ttl and no existing record"
    input:
      zone_records: []
      template_records:
        - {type: SPFM, host: "@", spfRules: foo}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: "@", data: "v=spf1 foo ~all", ttl: 6000}

  - id: spfm_merge_keeps_existing_ttl
    description: "SPFM merge keeps the ttl from the existing SPF record, ignoring any template ttl"
    input:
      zone_records:
        - {type: TXT, name: "@", data: "v=spf1 bar -all", ttl: 1800}
      template_records:
        - {type: SPFM, host: "@", spfRules: foo, ttl: 300}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: TXT, name: "@", data: "v=spf1 foo bar -all", ttl: 1800}

  # ---------------------------------------------------------------------------
  # NS
  # ---------------------------------------------------------------------------
  - id: ns_delete_with_a
    description: "A record deletes an NS at the same host"
    input:
      zone_records:
        - {type: NS, name: foo, data: abc, ttl: 500}
      template_records:
        - {type: A, host: foo, pointsTo: "127.0.0.1", ttl: 300}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: A, name: foo, data: "127.0.0.1", ttl: 300}

  - id: ns_delete_with_a_through_host
    description: "A record deletes NS at host resolved through the host parameter"
    input:
      zone_records:
        - {type: NS, name: foo.bar, data: abc, ttl: 500}
      template_records:
        - {type: A, host: foo, pointsTo: "127.0.0.0", ttl: 300}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: A, name: foo.bar, data: "127.0.0.0", ttl: 300}

  - id: ns_not_delete_with_a_below
    description: "A record does not delete NS at host below A"
    input:
      zone_records:
        - {type: NS, name: foo.bar, data: abc, ttl: 500}
      template_records:
        - {type: A, host: foo, pointsTo: "127.0.0.0", ttl: 300}
      domain: foo.com
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: A, name: foo, data: "127.0.0.0", ttl: 300}
        - {type: NS, name: foo.bar, data: abc, ttl: 500}

  - id: ns_deletes_a_below
    description: "NS record does delete A at host below NS"
    input:
      zone_records:
        - {type: A, name: foo.bar, data: "127.0.0.0", ttl: 300}
      template_records:
        - {type: NS, host: bar, pointsTo: abc, ttl: 500}
      domain: foo.com
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: NS, name: bar, data: abc, ttl: 500}


  - id: ns_deletes_a
    description: "NS record deletes an A record at the same host"
    input:
      zone_records:
        - {type: A, name: foo, data: abc, ttl: 500}
      template_records:
        - {type: NS, host: foo, pointsTo: def, ttl: 300}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: NS, name: foo, data: def, ttl: 300}

  - id: ns_deletes_a_through_host
    description: "NS record (applied via host) cascades to delete child A records"
    input:
      zone_records:
        - {type: A, name: www.foo.bar, data: abc, ttl: 500}
      template_records:
        - {type: NS, host: "@", pointsTo: def, ttl: 300}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: NS, name: bar, data: def, ttl: 300}

  - id: ns_cascade_delete_multiple
    description: "NS record cascades to delete all A records under host, but not sibling hosts"
    input:
      zone_records:
        - {type: A, name: bar,     data: abc, ttl: 500}
        - {type: A, name: www.bar, data: abc, ttl: 500}
        - {type: A, name: xbar,    data: abc, ttl: 500}
      template_records:
        - {type: NS, host: "@", pointsTo: def, ttl: 300}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 2
      records:
        - {type: NS, name: bar,  data: def, ttl: 300}
        - {type: A,  name: xbar, data: abc, ttl: 500}

  - id: NS_no_conflict_itself
    description: "NS raises no conflict if 2 NSs with same host generated"
    input:
      zone_records:
      template_records:
        - {type: NS, host: "%sub1%", pointsTo: abc, ttl: 600}
        - {type: NS, host: "%sub2%", pointsTo: cde, ttl: 600}
      domain: foo.com
      params: { sub1: 'blah', sub2: 'blah' }
    expect:
      new_count: 2
      delete_count: 0
      records:
        - {type: NS, name: blah, data: abc, ttl: 600}
        - {type: NS, name: blah, data: cde, ttl: 600}

  - id: NS_no_conflict_other_above
    description: "NS raises no conflict if other record generated above"
    input:
      zone_records:
      template_records:
        - {type: NS, host: "%sub1%", pointsTo: abc, ttl: 600}
        - {type: A, host: "%sub2%", pointsTo: 1.1.1.1, ttl: 600}
      domain: foo.com
      params: { sub1: 'delegated.blah', sub2: 'blah' }
    expect:
      new_count: 2
      delete_count: 0
      records:
        - {type: NS, name: delegated.blah, data: abc, ttl: 600}
        - {type: A, name: blah, data: 1.1.1.1, ttl: 600}

  - id: NS_conflict_itself_a
    description: "NS raises conflict with A other record on the same host generated"
    input:
      zone_records:
      template_records:
        - {type: NS, host: "%sub2%", pointsTo: abc, ttl: 600}
        - {type: A, host: "%sub1%", pointsTo: 192.168.1.1, ttl: 600}
      domain: foo.com
      params: { sub1: blah, sub2: blah }
    expect:
      exception: InvalidData

  - id: NS_conflict_itself_a_below
    description: "NS raises conflict with A other record below the same host generated"
    input:
      zone_records:
      template_records:
        - {type: NS, host: "%sub2%", pointsTo: abc, ttl: 600}
        - {type: A, host: "%sub1%.%sub2%", pointsTo: 192.168.1.1, ttl: 600}
      domain: foo.com
      params: { sub1: blah, sub2: blah }
    expect:
      exception: InvalidData

  # ---------------------------------------------------------------------------
  # TXT
  # ---------------------------------------------------------------------------
  - id: txt_underscore_first
    description: "TXT record with leading underscore in host is added"
    input:
      zone_records: []
      template_records:
        - {type: TXT, host: "_bar.sub", data: abcnew, ttl: 600}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: "_bar.sub", data: abcnew, ttl: 600}

  - id: txt_underscore_middle
    description: "TXT record with underscore in middle of host is added"
    input:
      zone_records: []
      template_records:
        - {type: TXT, host: "bar._sub", data: abcnew, ttl: 600}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: "bar._sub", data: abcnew, ttl: 600}

  - id: txt_underscore_both
    description: "TXT record with underscore in both parts of host is added"
    input:
