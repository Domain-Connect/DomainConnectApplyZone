  - id: param_percent_in_value
    description: "Percent signs in parameter values are preserved"
    input:
      zone_records: []
      template_records:
        - {type: TXT, host: "@", data: "abc%fff%def", ttl: 400}
      domain: foo.com
      host: bar
      params: {fff: "%ab%cd%"}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: bar, data: "abc%ab%cd%def", ttl: 400}

  # ---------------------------------------------------------------------------
  # Group filtering
  # ---------------------------------------------------------------------------
  - id: group_apply_one
    description: "Only records in the specified group are applied"
    input:
      zone_records:
        - {type: A, name: bar, data: abc, ttl: 400}
      template_records:
        - {type: A,   host: "@", pointsTo: "127.0.0.1", ttl: 600, groupId: "1"}
        - {type: TXT, host: "@", data: testdata,         ttl: 600, groupId: "2"}
      domain: foo.com
      host: bar
      params: {}
      group_ids: ["1"]
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: A, name: bar, data: "127.0.0.1", ttl: 600}

  - id: group_apply_none_matching
    description: "No records applied when group_ids contains no matching group"
    input:
      zone_records:
        - {type: A, name: bar, data: abc, ttl: 400}
      template_records:
        - {type: A,   host: "@", pointsTo: "127.0.0.1", ttl: 600, groupId: "1"}
        - {type: TXT, host: "@", data: testdata,         ttl: 600, groupId: "2"}
      domain: foo.com
      host: bar
      params: {}
      group_ids: ["3"]
    expect:
      new_count: 0
      delete_count: 0
      records:
        - {type: A, name: bar, data: abc, ttl: 400}

  - id: group_apply_two
    description: "Records from multiple groups can be applied together"
    input:
      zone_records:
        - {type: A, name: bar, data: abc, ttl: 400}
      template_records:
        - {type: A,   host: "@", pointsTo: "127.0.0.1", ttl: 600, groupId: "1"}
        - {type: TXT, host: "@", data: testdata,         ttl: 600, groupId: "2"}
      domain: foo.com
      host: bar
      params: {}
      group_ids: ["1", "2"]
    expect:
      new_count: 2
      delete_count: 1
      records:
        - {type: A,   name: bar, data: "127.0.0.1", ttl: 600}
        - {type: TXT, name: bar, data: testdata,    ttl: 600}

  # ---------------------------------------------------------------------------
  # REDIR
  # ---------------------------------------------------------------------------
  - id: redir301_basic
    description: "REDIR301 replaces A/AAAA/CNAME at host and adds redirect record"
    input:
      zone_records:
        - {type: A,    name: bar,          data: abc, ttl: 400}
        - {type: AAAA, name: bar,          data: abc, ttl: 400}
        - {type: CNAME, name: bar,         data: abc, ttl: 400}
        - {type: A,    name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: REDIR301, host: "@", target: "http://%target%"}
      domain: foo.com
      host: bar
      params: {target: example.com}
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 3
      delete_count: 3
      records:
        - {type: A,       name: bar,          data: "127.0.0.1",        ttl: 600}
        - {type: AAAA,    name: bar,          data: "::1",              ttl: 600}
        - {type: A,       name: random.value, data: abc,               ttl: 400}
        - {type: REDIR301, name: bar,         data: "http://example.com"}

  - id: redir301_double
    description: "Two REDIR301 records at different hosts both get redirect records"
    input:
      zone_records: []
      template_records:
        - {type: REDIR301, host: www, target: "http://%target%"}
        - {type: REDIR301, host: "@", target: "http://www.%fqdn%"}
      domain: foo.com
      host: ""
      params: {target: example.com}
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 6
      delete_count: 0
      records:
        - {type: A,        name: "@",  data: "127.0.0.1",          ttl: 600}
        - {type: AAAA,     name: "@",  data: "::1",                ttl: 600}
        - {type: REDIR301, name: "@",  data: "http://www.foo.com"}
        - {type: A,        name: www,  data: "127.0.0.1",          ttl: 600}
        - {type: AAAA,     name: www,  data: "::1",                ttl: 600}
        - {type: REDIR301, name: www,  data: "http://example.com"}

  - id: redir301_with_groupid_filtered_out
    description: "REDIR301 filtered out by group_ids does nothing"
    input:
      zone_records:
        - {type: A, name: bar,          data: abc, ttl: 400}
        - {type: A, name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: REDIR301, host: "@", target: "http://example.com", groupId: b}
      domain: foo.com
      host: bar
      params: {}
      group_ids: [a]
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 0
      delete_count: 0
      records:
        - {type: A, name: bar,          data: abc, ttl: 400}
        - {type: A, name: random.value, data: abc, ttl: 400}

  - id: redir302_basic
    description: "REDIR302 replaces A/AAAA/CNAME at host and adds redirect record"
    input:
      zone_records:
        - {type: A,    name: bar,          data: abc, ttl: 400}
        - {type: AAAA, name: bar,          data: abc, ttl: 400}
        - {type: CNAME, name: bar,         data: abc, ttl: 400}
        - {type: A,    name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: REDIR302, host: "@", target: "http://example.com"}
      domain: foo.com
      host: bar
      params: {}
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 3
      delete_count: 3
      records:
        - {type: A,        name: bar,          data: "127.0.0.1",        ttl: 600}
        - {type: AAAA,     name: bar,          data: "::1",              ttl: 600}
        - {type: A,        name: random.value, data: abc,               ttl: 400}
        - {type: REDIR302, name: bar,          data: "http://example.com"}

  # ---------------------------------------------------------------------------
  # Multi-aware / multi-instance
  # ---------------------------------------------------------------------------
  - id: multi_reapply_same_template
    description: "Re-applying the same template replaces old records"
    input:
      zone_records:
        - type: A
          name: "@"
          data: "127.0.0.1"
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.2", ttl: 500}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t1
      unique_id: def
    expect:
      new_count: 1
      delete_count: 1
      records:
        - type: A
          name: "@"
          data: "127.0.0.2"
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}

  - id: multi_reapply_txt_without_multi_instance
    description: "Re-applying TXT without multi-instance replaces old TXT record"
    input:
      zone_records:
        - type: TXT
          name: "@"
          data: dataold
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: TXT, host: "@", data: datanew, ttl: 500, txtConflictMatchingMode: None}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t1
      unique_id: def
    expect:
      new_count: 1
      delete_count: 1
      records:
        - type: TXT
          name: "@"
          data: datanew
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}

  - id: multi_reapply_txt_with_multi_instance
    description: "Re-applying TXT with multi-instance keeps old TXT and adds new one"
    input:
      zone_records:
        - type: TXT
          name: "@"
          data: olddata
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: TXT, host: "@", data: newdata, ttl: 500, txtConflictMatchingMode: None}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: true
      provider_id: e.d.org
      service_id: t1
      unique_id: def
    expect:
      new_count: 1
      delete_count: 0
      records:
        - type: TXT
          name: "@"
          data: newdata
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
        - type: TXT
          name: "@"
          data: olddata
          ttl: 400          
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
  - id: multi_different_template_cascade_delete
    description: "Applying a different template cascades to delete all records from old template"
    input:
      zone_records:
        - type: A
          name: "@"
          data: "127.0.0.1"
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
        - type: CNAME
          name: www
          data: "@"
          ttl: 500
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.2", ttl: 500}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t2
      unique_id: def
    expect:
      new_count: 1
      delete_count: 2
      records:
        - type: A
          name: "@"
          data: "127.0.0.2"
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t2, host: "@", essential: Always}

  - id: multi_essential_blocks_delete
    description: "Record with essential=Always is not deleted when a different template is applied"
    input:
      zone_records:
        - type: A
          name: "@"
          data: "127.0.0.1"
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: OnApply}
        - type: CNAME
          name: www
          data: "@"
          ttl: 500
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.2", ttl: 500, essential: OnApply}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t2
      unique_id: def
    expect:
      new_count: 1
      delete_count: 1
      records:
        - type: A
          name: "@"
          data: "127.0.0.2"
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t2, host: "@", essential: OnApply}
        - type: CNAME
          name: www
          data: "@"
          ttl: 500
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}

  # ---------------------------------------------------------------------------
  # Exception / validation
  # ---------------------------------------------------------------------------
  - id: exception_cname_at_apex
    description: "CNAME at the apex raises InvalidData"
    input:
      zone_records: []
      template_records:
        - {type: CNAME, host: "@", pointsTo: foo.com, ttl: 400}
      domain: foo.com
      host: ""
      params: {}
    expect:
      exception: InvalidData

  - id: exception_cname_empty_pointsto
    description: "CNAME with empty pointsTo raises InvalidData"
    input:
      zone_records: []
      template_records:
        - {type: CNAME, host: foo, pointsTo: "", ttl: 600}
      domain: foo.com
      host: ""
      params: {}
    expect:
      exception: InvalidData

  - id: exception_cname_empty_pointsto_from_variable
    description: "CNAME with pointsTo resolved to empty string raises InvalidData"
    input:
      zone_records: []
      template_records:
        - {type: CNAME, host: foo, pointsTo: "%var%", ttl: 600}
      domain: foo.com
      host: ""
      params: {var: ""}
    expect:
      exception: InvalidData

