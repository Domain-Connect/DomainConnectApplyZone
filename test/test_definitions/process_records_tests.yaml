      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: bar, data: abcbardef, ttl: 400}

  - id: param_domain_in_data
    description: "%domain% in data field is substituted"
    input:
      zone_records: []
      template_records:
        - {type: TXT, host: "@", data: "abc%domain%def", ttl: 400}
      domain: foo.com
      host: bar
      params: {}
