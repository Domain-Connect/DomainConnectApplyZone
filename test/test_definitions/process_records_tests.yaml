      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: A, name: bar, data: "127.0.0.1", ttl: 600}

  - id: param_at_in_host_with_host_param
    description: "@ in template host resolves to the host parameter"
    input:
      zone_records: []
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.1", ttl: 400}
      domain: foo.com
