  # ---------------------------------------------------------------------------
  # Variable in host field — empty / dot / underscore values
  # Tested for every RR type (A, AAAA, CNAME, TXT, MX, NS, SRV, custom CAA).
  #
  # Pattern 1 — host: "%var%"
  #   var=''          → apex (@)  [CNAME: apex is invalid → InvalidData]
  #   var='sub'       → simple subdomain
  #   var='child.sub' → multi-label (dot in value)
  #   var='_dkim'     → underscore label
  #
  # Pattern 2 — host: "%var%.subdomain"  (SRV: name: "%var%._tcp")
  #   var=''          → empty leading label → InvalidData
  #   var='sub'       → sub.subdomain
  #   var='child.sub' → child.sub.subdomain
  #   var='_dkim'     → _dkim.subdomain
  # ---------------------------------------------------------------------------

  # --- A ---
