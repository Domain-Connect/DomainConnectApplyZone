        - {type: CNAME, host: "foo.", pointsTo: bar.com, ttl: 600}
      domain: foo.com
      host: ""
      params: {}
    expect:
      exception: InvalidData

  - id: exception_a_trailing_dot_in_host
    description: "A record with trailing dot in host raises InvalidData"
    input:
      zone_records: []
      template_records:
        - {type: A, host: "foo.", pointsTo: "127.0.0.1", ttl: 600}
      domain: foo.com
      host: ""
      params: {}
