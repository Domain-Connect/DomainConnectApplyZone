  # ---------------------------------------------------------------------------
  # Group filtering
  # ---------------------------------------------------------------------------
  - id: group_apply_one
    description: "Only records in the specified group are applied"
    input:
      zone_records:
        - {type: A, name: bar, data: abc, ttl: 400}
      template_records:
        - {type: A,   host: "@", pointsTo: "127.0.0.1", ttl: 600, groupId: "1"}
        - {type: TXT, host: "@", data: testdata,         ttl: 600, groupId: "2"}
      domain: foo.com
      host: bar
      params: {}
      group_ids: ["1"]
    expect:
      new_count: 1
      delete_count: 1
      records:
        - {type: A, name: bar, data: "127.0.0.1", ttl: 600}

  - id: group_apply_none_matching
    description: "No records applied when group_ids contains no matching group"
    input:
      zone_records:
        - {type: A, name: bar, data: abc, ttl: 400}
      template_records:
        - {type: A,   host: "@", pointsTo: "127.0.0.1", ttl: 600, groupId: "1"}
        - {type: TXT, host: "@", data: testdata,         ttl: 600, groupId: "2"}
      domain: foo.com
      host: bar
      params: {}
      group_ids: ["3"]
    expect:
      new_count: 0
      delete_count: 0
      records:
        - {type: A, name: bar, data: abc, ttl: 400}

  - id: group_apply_two
    description: "Records from multiple groups can be applied together"
    input:
      zone_records:
        - {type: A, name: bar, data: abc, ttl: 400}
      template_records:
        - {type: A,   host: "@", pointsTo: "127.0.0.1", ttl: 600, groupId: "1"}
        - {type: TXT, host: "@", data: testdata,         ttl: 600, groupId: "2"}
      domain: foo.com
      host: bar
      params: {}
      group_ids: ["1", "2"]
    expect:
      new_count: 2
      delete_count: 1
      records:
        - {type: A,   name: bar, data: "127.0.0.1", ttl: 600}
        - {type: TXT, name: bar, data: testdata,    ttl: 600}

  # ---------------------------------------------------------------------------
  # REDIR
  # ---------------------------------------------------------------------------
  - id: redir301_basic
    description: "REDIR301 replaces A/AAAA/CNAME at host and adds redirect record"
    input:
      zone_records:
        - {type: A,    name: bar,          data: abc, ttl: 400}
        - {type: AAAA, name: bar,          data: abc, ttl: 400}
        - {type: CNAME, name: bar,         data: abc, ttl: 400}
        - {type: A,    name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: REDIR301, host: "@", target: "http://%target%"}
      domain: foo.com
      host: bar
      params: {target: example.com}
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 3
      delete_count: 3
      records:
        - {type: A,       name: bar,          data: "127.0.0.1",        ttl: 600}
        - {type: AAAA,    name: bar,          data: "::1",              ttl: 600}
        - {type: A,       name: random.value, data: abc,               ttl: 400}
        - {type: REDIR301, name: bar,         data: "http://example.com"}

  - id: redir301_double
    description: "Two REDIR301 records at different hosts both get redirect records"
    input:
      zone_records: []
      template_records:
        - {type: REDIR301, host: www, target: "http://%target%"}
        - {type: REDIR301, host: "@", target: "http://www.%fqdn%"}
      domain: foo.com
      host: ""
      params: {target: example.com}
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 6
      delete_count: 0
      records:
        - {type: A,        name: "@",  data: "127.0.0.1",          ttl: 600}
        - {type: AAAA,     name: "@",  data: "::1",                ttl: 600}
        - {type: REDIR301, name: "@",  data: "http://www.foo.com"}
        - {type: A,        name: www,  data: "127.0.0.1",          ttl: 600}
        - {type: AAAA,     name: www,  data: "::1",                ttl: 600}
        - {type: REDIR301, name: www,  data: "http://example.com"}

  - id: redir301_with_groupid_filtered_out
    description: "REDIR301 filtered out by group_ids does nothing"
    input:
      zone_records:
        - {type: A, name: bar,          data: abc, ttl: 400}
        - {type: A, name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: REDIR301, host: "@", target: "http://example.com", groupId: b}
      domain: foo.com
      host: bar
      params: {}
      group_ids: [a]
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 0
      delete_count: 0
      records:
        - {type: A, name: bar,          data: abc, ttl: 400}
        - {type: A, name: random.value, data: abc, ttl: 400}

  - id: redir302_basic
    description: "REDIR302 replaces A/AAAA/CNAME at host and adds redirect record"
    input:
      zone_records:
        - {type: A,    name: bar,          data: abc, ttl: 400}
        - {type: AAAA, name: bar,          data: abc, ttl: 400}
        - {type: CNAME, name: bar,         data: abc, ttl: 400}
        - {type: A,    name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: REDIR302, host: "@", target: "http://example.com"}
      domain: foo.com
      host: bar
      params: {}
      redirect_records:
        - {type: A,    pointsTo: "127.0.0.1", ttl: 600}
        - {type: AAAA, pointsTo: "::1",       ttl: 600}
    expect:
      new_count: 3
      delete_count: 3
      records:
        - {type: A,        name: bar,          data: "127.0.0.1",        ttl: 600}
