  - id: param_missing_variable
    description: "Missing variable raises MissingParameter"
    input:
      zone_records: []
      template_records:
        - {type: A, host: "@", pointsTo: "%missing%", ttl: 600}
      domain: foo.com
      host: bar
      params: {}
