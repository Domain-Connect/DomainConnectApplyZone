      records:
        - {type: A, name: "@", data: "127.0.0.1", ttl: 400}

  - id: param_at_in_pointsto_without_host
    description: "@ in template pointsTo resolves to domain when no host parameter given"
    input:
      zone_records: []
      template_records:
        - {type: CNAME, host: bar, pointsTo: "@", ttl: 400}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: CNAME, name: bar, data: foo.com, ttl: 400}

  - id: param_fqdn_in_data
    description: "%fqdn% in data field is substituted"
    input:
      zone_records: []
      template_records:
        - {type: TXT, host: "@", data: "abc%fqdn%def", ttl: 400}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: TXT, name: bar, data: abcbar.foo.comdef, ttl: 400}

  - id: param_host_in_data
    description: "%host% in data field is substituted"
    input:
      zone_records: []
      template_records:
        - {type: TXT, host: "@", data: "abc%host%def", ttl: 400}
      domain: foo.com
      host: bar
      params: {}
