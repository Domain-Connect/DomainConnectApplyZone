        - {type: TXT, name: "@", data: "789",  ttl: 500}
        - {type: TXT, name: "@", data: abcnew, ttl: 600}

  - id: txt_matching_mode_all
    description: "TXT with txtConflictMatchingMode=All deletes all TXTs at the same host"
    input:
      zone_records:
        - {type: TXT, name: "@",  data: xyz456, ttl: 500}
        - {type: TXT, name: foo,  data: abc456, ttl: 500}
        - {type: TXT, name: foo,  data: abc123, ttl: 500}
        - {type: TXT, name: foo,  data: "789",  ttl: 500}
      template_records:
        - {type: TXT, host: foo, data: abcnew, ttl: 600, txtConflictMatchingMode: All}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 3
      records:
        - {type: TXT, name: "@",  data: xyz456, ttl: 500}
        - {type: TXT, name: foo,  data: abcnew, ttl: 600}

  - id: txt_matching_mode_prefix
    description: "TXT with txtConflictMatchingMode=Prefix deletes TXTs starting with specified prefix"
    input:
      zone_records:
        - {type: TXT, name: "@",  data: abc789, ttl: 500}
        - {type: TXT, name: foo,  data: abc456, ttl: 500}
        - {type: TXT, name: foo,  data: abc123, ttl: 500}
        - {type: TXT, name: foo,  data: "789",  ttl: 500}
      template_records:
        - {type: TXT, host: foo, data: abcnew, ttl: 600, txtConflictMatchingMode: Prefix, txtConflictMatchingPrefix: abc}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 2
      records:
        - {type: TXT, name: "@",  data: abc789, ttl: 500}
        - {type: TXT, name: foo,  data: "789",  ttl: 500}
        - {type: TXT, name: foo,  data: abcnew, ttl: 600}

  # ---------------------------------------------------------------------------
  # A
  # ---------------------------------------------------------------------------
  - id: a_deletes_a_aaaa_cname
    description: "A record deletes conflicting A, AAAA, and CNAME at the same host"
    input:
      zone_records:
        - {type: A,    name: bar,          data: abc, ttl: 400}
        - {type: AAAA, name: bar,          data: abc, ttl: 400}
        - {type: CNAME, name: bar,         data: abc, ttl: 400}
        - {type: A,    name: random.value, data: abc, ttl: 400}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.1", ttl: 600}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 3
      records:
        - {type: A, name: bar,          data: "127.0.0.1", ttl: 600}
        - {type: A, name: random.value, data: abc,         ttl: 400}

  # ---------------------------------------------------------------------------
  # MX
  # ---------------------------------------------------------------------------
  - id: mx_conflict_replace
    description: "MX record replaces existing MX records at the same host"
    input:
      zone_records:
        - {type: MX,    name: "@", data: mx1,  ttl: 400, priority: 4}
        - {type: MX,    name: "@", data: mx2,  ttl: 400, priority: 10}
        - {type: CNAME, name: foo, data: abc,  ttl: 400}
        - {type: A,     name: "@", data: abc,  ttl: 400}
      template_records:
        - {type: MX, host: "@", pointsTo: newmx, ttl: 400, priority: 5}
      domain: foo.com
      host: ""
      params: {}
    expect:
      new_count: 1
      delete_count: 2
      records:
        - {type: MX,    name: "@", data: newmx, ttl: 400, priority: 5}
        - {type: CNAME, name: foo, data: abc,   ttl: 400}
        - {type: A,     name: "@", data: abc,   ttl: 400}

