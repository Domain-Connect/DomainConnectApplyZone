        - {type: REDIR302, name: bar,          data: "http://example.com"}

  # ---------------------------------------------------------------------------
  # Multi-aware / multi-instance
  # ---------------------------------------------------------------------------
  - id: multi_reapply_same_template
    description: "Re-applying the same template replaces old records"
    input:
      zone_records:
        - type: A
          name: "@"
          data: "127.0.0.1"
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.2", ttl: 500}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t1
      unique_id: def
    expect:
      new_count: 1
      delete_count: 1
      records:
        - type: A
          name: "@"
          data: "127.0.0.2"
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}

  - id: multi_reapply_txt_without_multi_instance
    description: "Re-applying TXT without multi-instance replaces old TXT record"
    input:
      zone_records:
        - type: TXT
          name: "@"
          data: dataold
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: TXT, host: "@", data: datanew, ttl: 500, txtConflictMatchingMode: None}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t1
      unique_id: def
    expect:
      new_count: 1
      delete_count: 1
      records:
        - type: TXT
          name: "@"
          data: datanew
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}

  - id: multi_reapply_txt_with_multi_instance
    description: "Re-applying TXT with multi-instance keeps old TXT and adds new one"
    input:
      zone_records:
        - type: TXT
          name: "@"
          data: olddata
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: TXT, host: "@", data: newdata, ttl: 500, txtConflictMatchingMode: None}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: true
      provider_id: e.d.org
      service_id: t1
      unique_id: def
    expect:
      new_count: 1
      delete_count: 0
      records:
        - type: TXT
          name: "@"
          data: newdata
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
        - type: TXT
          name: "@"
          data: olddata
          ttl: 400          
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
  - id: multi_different_template_cascade_delete
    description: "Applying a different template cascades to delete all records from old template"
    input:
      zone_records:
        - type: A
          name: "@"
          data: "127.0.0.1"
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
        - type: CNAME
          name: www
          data: "@"
          ttl: 500
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.2", ttl: 500}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t2
      unique_id: def
    expect:
      new_count: 1
      delete_count: 2
      records:
        - type: A
          name: "@"
          data: "127.0.0.2"
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t2, host: "@", essential: Always}

  - id: multi_essential_blocks_delete
    description: "Record with essential=Always is not deleted when a different template is applied"
    input:
      zone_records:
        - type: A
          name: "@"
          data: "127.0.0.1"
          ttl: 400
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: OnApply}
        - type: CNAME
          name: www
          data: "@"
          ttl: 500
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}
      template_records:
        - {type: A, host: "@", pointsTo: "127.0.0.2", ttl: 500, essential: OnApply}
      domain: foo.com
      host: "@"
      params: {}
      multi_aware: true
      multi_instance: false
      provider_id: e.d.org
      service_id: t2
      unique_id: def
    expect:
      new_count: 1
      delete_count: 1
      records:
        - type: A
          name: "@"
          data: "127.0.0.2"
          ttl: 500
          _dc: {id: def, providerId: e.d.org, serviceId: t2, host: "@", essential: OnApply}
        - type: CNAME
          name: www
          data: "@"
          ttl: 500
          _dc: {id: abc, providerId: e.d.org, serviceId: t1, host: "@", essential: Always}

