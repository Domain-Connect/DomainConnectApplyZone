  # ---------------------------------------------------------------------------
  # Custom record types (CAA, TYPE<N>, etc.)
  # ---------------------------------------------------------------------------
  - id: custom_caa_add
    description: "Custom CAA record is added without conflict deletion"
    input:
      zone_records: []
      template_records:
        - {type: CAA, host: "@", data: '0 issue "letsencrypt.org"', ttl: 3600}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: CAA, name: bar, data: '0 issue "letsencrypt.org"', ttl: 3600}

  - id: custom_caa_no_conflict_delete
    description: "Applying a custom record does NOT delete existing records of the same type/host"
    input:
      zone_records:
        - {type: CAA, name: bar,   data: '0 issue "old.com"', ttl: 300}
        - {type: CAA, name: other, data: '0 issue "old.com"', ttl: 300}
      template_records:
        - {type: CAA, host: "@", data: '0 issue "new.com"', ttl: 3600}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: CAA, name: bar,   data: '0 issue "new.com"', ttl: 3600}
        - {type: CAA, name: bar,   data: '0 issue "old.com"', ttl: 300}
        - {type: CAA, name: other, data: '0 issue "old.com"', ttl: 300}

  - id: custom_caa_variable_substitution
    description: "Custom record type supports %variable% substitution in data"
    input:
      zone_records: []
      template_records:
        - {type: CAA, host: "@", data: '0 issue "%issuer%"', ttl: 3600}
      domain: foo.com
      host: bar
      params: {issuer: example.com}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: CAA, name: bar, data: '0 issue "example.com"', ttl: 3600}

  - id: custom_caa_data_at_resolves_to_fqdn
    description: "Custom record data field resolves @ to fqdn"
    input:
      zone_records: []
      template_records:
        - {type: CAA, host: "@", data: "@", ttl: 3600}
      domain: foo.com
      host: bar
      params: {}
    expect:
      new_count: 1
      delete_count: 0
      records:
        - {type: CAA, name: bar, data: bar.foo.com, ttl: 3600}

  - id: custom_type256_rfc3597
    description: "TYPE<N> syntax (RFC 3597) is accepted as a custom record type"
    input:
      zone_records: []
      template_records:
        - {type: TYPE256, host: "@", data: "\\# 4 c0000201", ttl: 3600}
      domain: foo.com
