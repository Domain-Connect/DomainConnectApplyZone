      template_records:
        - type: CNAME
          host: "0123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.123456789.com"
          pointsTo: bar.com
          ttl: 600
      domain: foo.com
      host: ""
      params: {}
